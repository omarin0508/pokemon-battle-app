<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Battle — Stage 1</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <section class="trainer-panel">
      <div id="trainer-card"></div>

      <div class="search-box">
        <input
          type="text"
          id="opponent-input"
          placeholder="Search opponent Pokémon..."
          autocomplete="off"
        />
        <button id="search-btn" type="button">Search</button>
      </div>
    </section>

    <section class="battle-arena">
      <div id="player-slot" class="battle-slot"></div>

      <div class="battle-center">
        <div class="vs-badge">VS</div>

        <div class="battle-actions">
          <button id="fight-btn" class="fight-btn" type="button">Go to Battle</button>
          <button id="reset-btn" class="reset-btn" type="button">Reset</button>
        </div>

        <div id="battle-result" class="battle-result">
          <p>Choose an opponent and press Go to Battle.</p>
        </div>
      </div>

      <div id="opponent-slot" class="battle-slot"></div>
    </section>

    <section id="battle-log" class="battle-log">
      <div class="battle-log-content">
        <h3>Battle Notes</h3>
        <div class="battle-log-list">
          <p>Your selected Pokémon and opponent will be prepared here before entering Stage 2.</p>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
